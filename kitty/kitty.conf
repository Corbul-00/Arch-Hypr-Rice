# Background and transparency
background #2d1338
background_opacity 0.7
dynamic_background_opacity yes
dim_opacity 0.75

# Font settings to match Waybar
font_family JetBrainsMono Nerd Font
font_size 14

# Cursor and text colors to harmonize with Waybar
foreground #d8c2f0
cursor #8b5cf6
selection_background #8b5cf6
selection_foreground #ffffff

# Tab bar styling to blend with Waybar
tab_bar_style fade
tab_fade 0.5 1 1 0
active_tab_background #8b5cf6
inactive_tab_background #2a2a6e
tab_bar_background #2a2a6e

